name: CI — Hurix Talent Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hurix
          POSTGRES_PASSWORD: hurix_secret
          POSTGRES_DB: hurix_talent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://hurix:hurix_secret@localhost:5432/hurix_talent_test?schema=public
      DATABASE_URL: postgresql://hurix:hurix_secret@localhost:5432/hurix_talent_test?schema=public
      EMAIL_MOCK_MODE: 'true'
      SANDBOX_MOCK_MODE: 'true'
      JWT_ASSESSMENT_SECRET: test-assessment-secret-key-32chars!!
      JWT_ADMIN_SECRET: test-admin-secret-key-32chars!!!!

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run migrations and seed
        working-directory: backend
        run: npx prisma migrate deploy && npm run prisma:seed

      - name: Unit tests with coverage
        working-directory: backend
        run: npm run test:unit

      - name: Integration tests
        working-directory: backend
        run: npm run test:integration

      - name: Security tests
        working-directory: backend
        run: npm run test:security

      - name: Backend coverage gate
        working-directory: backend
        run: npm run test:coverage

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend unit tests with coverage gate
        working-directory: frontend
        run: npm run test:coverage

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hurix
          POSTGRES_PASSWORD: hurix_secret
          POSTGRES_DB: hurix_talent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hurix:hurix_secret@localhost:5432/hurix_talent_test?schema=public
      TEST_DATABASE_URL: postgresql://hurix:hurix_secret@localhost:5432/hurix_talent_test?schema=public
      EMAIL_MOCK_MODE: 'true'
      SANDBOX_MOCK_MODE: 'true'
      JWT_ASSESSMENT_SECRET: test-assessment-secret-key-32chars!!
      JWT_ADMIN_SECRET: test-admin-secret-key-32chars!!!!

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci
          cd ../e2e && npm ci
          npx playwright install chromium --with-deps
        working-directory: .

      - name: Setup database
        working-directory: backend
        run: npx prisma migrate deploy && npm run prisma:seed

      - name: Playwright E2E
        working-directory: e2e
        run: npm test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
